<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="108" ry="108" fill="url(#bg)"/>
  <!-- Document/exam icon -->
  <rect x="120" y="64" width="220" height="290" rx="24" fill="white" fill-opacity="0.95"/>
  <!-- Lines on document -->
  <rect x="164" y="116" width="132" height="14" rx="7" fill="#3b82f6" fill-opacity="0.3"/>
  <rect x="164" y="148" width="100" height="14" rx="7" fill="#3b82f6" fill-opacity="0.2"/>
  <rect x="164" y="188" width="132" height="14" rx="7" fill="#3b82f6" fill-opacity="0.3"/>
  <rect x="164" y="220" width="88" height="14" rx="7" fill="#3b82f6" fill-opacity="0.2"/>
  <rect x="164" y="260" width="116" height="14" rx="7" fill="#3b82f6" fill-opacity="0.3"/>
  <rect x="164" y="292" width="72" height="14" rx="7" fill="#3b82f6" fill-opacity="0.2"/>
  <!-- Green check circle -->
  <circle cx="360" cy="344" r="88" fill="url(#accent)"/>
  <circle cx="360" cy="344" r="74" fill="none" stroke="white" stroke-width="6" stroke-opacity="0.3"/>
  <!-- Checkmark -->
