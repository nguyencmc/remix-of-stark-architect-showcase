  <!-- I letter -->
  <path d="M232,400 L232,468 M220,400 L244,400 M220,468 L244,468" fill="none" stroke="white" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" stroke-opacity="0.9"/>
  <!-- Sparkle dots -->
  <circle cx="420" cy="96" r="8" fill="white" fill-opacity="0.5"/>
  <circle cx="96" cy="128" r="6" fill="white" fill-opacity="0.35"/>
  <circle cx="448" cy="200" r="5" fill="white" fill-opacity="0.25"/>
