# DigitalOcean App Platform Specification
# ========================================
# To deploy:
#   1. Go to https://cloud.digitalocean.com/apps → Create App
#   2. Choose "Import from GitHub" and select this repository
#   3. DO will auto-detect this .do/app.yaml
#   4. IMPORTANT: Add the following BUILD_TIME secrets in the App Settings:
#      - VITE_SUPABASE_URL (your Supabase project URL)
#      - VITE_SUPABASE_ANON_KEY (your Supabase anon/publishable key)
#   5. Deploy!
#
# TROUBLESHOOTING - Deployment stopped after GitHub repo rename:
#   If you renamed the repository on GitHub, DigitalOcean will stop receiving
#   push events and deploy_on_push will no longer work. To fix:
#   1. Go to https://cloud.digitalocean.com/apps → select your app
#   2. Go to Settings → scroll to "App Source"
#   3. Click "Edit" next to the source repository
#   4. Re-select the repository with its new name from the GitHub list
#      (you may need to re-authorize the DigitalOcean GitHub App)
#   5. Save and trigger a manual deploy
#   Alternatively, delete the old app and create a new one from the renamed repo.

name: ai-exam-cloud
region: sgp

services:
  - name: web
    dockerfile_path: Dockerfile
    github:
      repo: nguyencmc/ai-learn-and-exams-online-11921
      branch: main
      deploy_on_push: true
    http_port: 8080
    instance_count: 1
    instance_size_slug: basic-xxs
    health_check:
      http_path: /healthz
      initial_delay_seconds: 15
      period_seconds: 30
      timeout_seconds: 5
      failure_threshold: 3
    routes:
      - path: /
    envs:
      - key: VITE_SUPABASE_URL
        scope: BUILD_TIME
        type: SECRET
      - key: VITE_SUPABASE_ANON_KEY
        scope: BUILD_TIME
        type: SECRET
